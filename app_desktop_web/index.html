<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C5 交易助手</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(128, 214, 164, 0.12), transparent 35%),
          linear-gradient(180deg, #13181f, #0f1318 68%);
        color: #f3efe6;
        font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      .app-static-startup-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        box-sizing: border-box;
      }

      .app-static-startup-shell__panel {
        width: min(680px, 100%);
        display: grid;
        gap: 10px;
        padding: 30px 32px;
        border: 1px solid rgba(128, 214, 164, 0.22);
        border-radius: 24px;
        background:
          radial-gradient(circle at top left, rgba(128, 214, 164, 0.14), transparent 42%),
          linear-gradient(180deg, rgba(20, 24, 31, 0.96), rgba(15, 18, 22, 0.94));
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      }

      .app-static-startup-shell__eyebrow {
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #80d6a4;
      }

      .app-static-startup-shell__title {
        margin: 0;
        font-size: clamp(28px, 3vw, 38px);
      }

      .app-static-startup-shell__text {
        margin: 0;
        line-height: 1.7;
        color: rgba(243, 239, 230, 0.82);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <section class="app-static-startup-shell" role="status" aria-live="polite">
        <div class="app-static-startup-shell__panel">
          <span class="app-static-startup-shell__eyebrow">Desktop Bootstrap</span>
          <h1 class="app-static-startup-shell__title">主界面启动中</h1>
          <p class="app-static-startup-shell__text">正在准备界面与本地服务，请稍候片刻。</p>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
