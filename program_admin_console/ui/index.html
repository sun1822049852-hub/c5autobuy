<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>C5 交易助手 控制台</title>
    <link rel="stylesheet" href="/admin/styles.css">
  </head>
  <body>
    <div class="shell">
      <aside class="shell-sidebar">
        <div class="brand">
          <div class="brand-mark">C5</div>
          <div>
            <strong>C5 交易助手 控制台</strong>
            <p>用户控制台</p>
          </div>
        </div>
        <div id="sidebarCopy" class="sidebar-copy">
          <h1>管理控制台</h1>
          <p>请登录以继续。</p>
        </div>
        <div class="sidebar-session">
          <div id="sessionSummary">尚未登录</div>
          <button id="logoutButton" type="button" hidden>退出控制台</button>
        </div>
      </aside>

      <main class="shell-main">
        <header id="pageHeader" class="page-header">
          <p class="eyebrow">管理控制台</p>
          <h2>请登录</h2>
          <p></p>
        </header>

        <section id="authPanel" class="panel auth-panel">
          <div class="panel-head">
            <h3 id="authTitle">管理员登录</h3>
            <p id="authHint">使用管理员账号进入控制台。</p>
          </div>

          <div id="authMessage" class="notice" hidden></div>

          <form id="bootstrapForm" class="stack" hidden>
            <label>
              <span>管理员用户名</span>
              <input id="bootstrapUsername" value="admin" autocomplete="username">
            </label>
            <label>
              <span>管理员密码</span>
              <input id="bootstrapPassword" type="password" autocomplete="new-password">
            </label>
            <button type="submit">初始化超级管理员</button>
          </form>

          <form id="loginForm" class="stack" hidden>
            <label>
              <span>管理员用户名</span>
              <input id="loginUsername" value="admin" autocomplete="username">
            </label>
            <label>
              <span>管理员密码</span>
              <input id="loginPassword" type="password" autocomplete="current-password">
            </label>
            <button type="submit">登录控制台</button>
          </form>
        </section>

        <section id="workspace" class="workspace" hidden>
          <div id="workspaceMessage" class="notice workspace-message" hidden></div>

          <section class="panel">
            <div class="panel-head">
              <h3>用户列表</h3>
              <p>选择用户后，在右侧调整状态、计划、权限覆盖并吊销设备。</p>
            </div>
            <div id="usersList" class="user-list"></div>
          </section>

          <section class="detail-column">
            <section class="panel">
              <div class="panel-head">
                <h3>用户详情</h3>
                <p id="detailHint">选择左侧用户后即可编辑。</p>
              </div>

              <form id="userForm" class="stack" hidden>
                <div class="readout-grid">
                  <div>
                    <span class="field-label">用户名</span>
                    <strong id="detailUsername">-</strong>
                  </div>
                  <div>
                    <span class="field-label">邮箱</span>
                    <strong id="detailEmail">-</strong>
                  </div>
                </div>

                <label>
                  <span>账号状态</span>
                  <select id="userStatus">
                    <option value="active">active</option>
                    <option value="disabled">disabled</option>
                  </select>
                </label>

                <label>
                  <span>会员计划</span>
                  <select id="userPlan">
                    <option value="inactive">inactive</option>
                    <option value="member">member</option>
                  </select>
                </label>

                <div class="expiry-grid">
                  <label>
                    <span>到期日期</span>
                    <input id="userExpiryDate" type="date">
                  </label>
                  <label>
                    <span>到期时间</span>
                    <input id="userExpiryTime" type="time" step="60" value="23:59">
                  </label>
                </div>

                <div id="membershipMeta" class="meta-card"></div>

                <div class="stack stack--dense">
                  <div>
                    <span class="field-label">实际权限</span>
                    <div id="effectivePermissions" class="token-list"></div>
                  </div>

                  <div class="stack stack--dense">
                    <span class="field-label">权限覆盖</span>

                    <label class="permission-card">
                      <span>program_access_enabled</span>
                      <small>程序访问总开关。关闭后即使是 member 也不会进入可授权态。</small>
                      <select id="permissionOverrideProgramAccessEnabled">
                        <option value="inherit">继承计划</option>
                        <option value="force_on">强制开启</option>
                        <option value="force_off">强制关闭</option>
                      </select>
                    </label>

                    <label class="permission-card">
                      <span>runtime.start</span>
                      <small>控制查询/扫货启动许可；通常与 program_access_enabled 配合使用。</small>
                      <select id="permissionOverrideRuntimeStart">
                        <option value="inherit">继承计划</option>
                        <option value="force_on">强制开启</option>
                        <option value="force_off">强制关闭</option>
                      </select>
                    </label>

                    <label class="permission-card">
                      <span>account.browser_query.enable</span>
                      <small>控制“浏览器查询”开关是否允许从关闭切到开启。</small>
                      <select id="permissionOverrideAccountBrowserQueryEnable">
                        <option value="inherit">继承计划</option>
                        <option value="force_on">强制开启</option>
                        <option value="force_off">强制关闭</option>
                      </select>
                    </label>
                  </div>
                </div>

                <button type="submit">保存用户配置</button>
              </form>
            </section>

            <section class="panel">
              <div class="panel-head">
                <h3>设备会话</h3>
                <p>可以逐个吊销当前用户的 refresh session。</p>
              </div>
              <div id="deviceList" class="device-list"></div>
            </section>
          </section>
        </section>
      </main>
    </div>

    <script src="/admin/app.js"></script>
  </body>
</html>
